{% extends "base.html" %}
{% block title %}Koleksiku — Animeku.id{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-inner">
    <h1 class="page-header-title">Koleksi<span style="color:var(--accent)">ku</span></h1>
    <p class="page-header-sub">Watchlist & riwayat tontonan tersimpan di browser kamu</p>
  </div>
</div>
<section class="section">
  <div class="container">
    <div class="koleksi-toolbar">
      <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('watchlist', this)"><i class="fas fa-fire"></i> Watchlist</button>
        <button class="tab-btn" onclick="switchTab('history', this)"><i class="fas fa-fire"></i> Riwayat</button>
      </div>
      <button id="clearBtn" class="koleksi-clear-btn" onclick="clearActive()">
        <i class="fas fa-trash"></i> Hapus Semua
      </button>
    </div>
    <div id="tab-watchlist" class="tab-pane active">
      <div id="watchlistContainer">
        <div class="empty-state"><h3>Memuat...</h3></div>
      </div>
    </div>
    <div id="tab-history" class="tab-pane">
      <div id="historyContainer">
        <div class="empty-state"><h3>Memuat...</h3></div>
      </div>
    </div>
  </div>
</section>
<script>
function switchTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  // Re-render saat tab di-switch
  if (name === 'watchlist') renderWatchlist();
  if (name === 'history') renderHistory();
}
</script>
{% endblock %}

{% block scripts %}
<script>
  // Pastikan render dipanggil setelah main.js selesai load
  renderWatchlist();
  renderHistory();
</script>

<!-- Custom Confirm Modal -->
<div id="confirmModal" style="display:none;position:fixed;inset:0;z-index:99999;align-items:center;justify-content:center;padding:20px">
  <div id="confirmBackdrop" onclick="closeConfirmModal()" style="position:absolute;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px)"></div>
  <div style="position:relative;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 28px;max-width:340px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,0.6);animation:modalIn .2s ease">
    <div id="confirmIcon" style="width:56px;height:56px;background:rgba(230,57,70,0.12);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
      <i id="confirmIconI" class="fas fa-trash" style="font-size:22px;color:var(--accent)"></i>
    </div>
    <h3 id="confirmTitle" style="text-align:center;font-size:18px;font-weight:700;color:var(--text);margin:0 0 10px"></h3>
    <p id="confirmDesc" style="text-align:center;font-size:14px;color:var(--text2);margin:0 0 28px;line-height:1.6"></p>
    <div style="display:flex;gap:10px">
      <button onclick="closeConfirmModal()" style="flex:1;padding:12px;background:var(--border);border:none;border-radius:12px;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:opacity .15s">Batal</button>
      <button id="confirmOkBtn" style="flex:1;padding:12px;background:var(--accent);border:none;border-radius:12px;color:white;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-body);transition:opacity .15s">Hapus</button>
    </div>
  </div>
</div>
<style>
@keyframes modalIn {
  from { opacity:0; transform:scale(.92) translateY(12px); }
  to   { opacity:1; transform:scale(1)  translateY(0); }
}
</style>
<script>
var _confirmCallback = null;
function showConfirmModal(title, desc, icon, callback) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmDesc').textContent = desc;
  document.getElementById('confirmIconI').className = icon + ' ';
  document.getElementById('confirmIconI').style.fontSize = '22px';
  document.getElementById('confirmIconI').style.color = 'var(--accent)';
  _confirmCallback = callback;
  var modal = document.getElementById('confirmModal');
  modal.style.display = 'flex';
}
function closeConfirmModal() {
  document.getElementById('confirmModal').style.display = 'none';
  _confirmCallback = null;
}
document.getElementById('confirmOkBtn').onclick = function() {
  closeConfirmModal();
  if (_confirmCallback) _confirmCallback();
};
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeConfirmModal();
});
</script>

{% endblock %}
