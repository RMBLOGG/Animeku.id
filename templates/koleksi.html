{% extends "base.html" %}
{% block title %}Koleksiku — Animeku.id{% endblock %}
{% block content %}
<div class="page-header">
  <div class="page-header-inner">
    <h1 class="page-header-title">Koleksi<span style="color:var(--accent)">ku</span></h1>
    <p class="page-header-sub">Watchlist, riwayat, & status tontonan tersimpan di browser kamu</p>
  </div>
</div>
<section class="section">
  <div class="container">
    <div class="koleksi-toolbar">
      <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('watchlist', this)"><i class="fas fa-heart"></i> Watchlist</button>
        <button class="tab-btn" onclick="switchTab('status', this)"><i class="fas fa-list"></i> Status</button>
        <button class="tab-btn" onclick="switchTab('history', this)"><i class="fas fa-history"></i> Riwayat</button>
      </div>
      <button id="clearBtn" class="koleksi-clear-btn" onclick="clearActive()">
        <i class="fas fa-trash"></i> Hapus Semua
      </button>
    </div>

    <div id="tab-watchlist" class="tab-pane active">
      <div id="watchlistContainer">
        <div class="empty-state"><h3>Memuat...</h3></div>
      </div>
    </div>

    <!-- STATUS TRACKING TAB -->
    <div id="tab-status" class="tab-pane">
      <!-- Filter bar -->
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px" id="statusFilterBar">
        <button class="st-filter-btn active" data-filter="all" onclick="filterStatus('all',this)">Semua</button>
        <button class="st-filter-btn" data-filter="watching"  onclick="filterStatus('watching',this)">▶ Watching</button>
        <button class="st-filter-btn" data-filter="plan"      onclick="filterStatus('plan',this)">📌 Plan</button>
        <button class="st-filter-btn" data-filter="completed" onclick="filterStatus('completed',this)">✅ Completed</button>
        <button class="st-filter-btn" data-filter="dropped"   onclick="filterStatus('dropped',this)">🚫 Dropped</button>
      </div>
      <div id="statusContainer">
        <div class="empty-state"><h3>Memuat...</h3></div>
      </div>
    </div>

    <div id="tab-history" class="tab-pane">
      <div id="historyContainer">
        <div class="empty-state"><h3>Memuat...</h3></div>
      </div>
    </div>
  </div>
</section>

<style>
.st-filter-btn {
  padding: 6px 14px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text3);
  font-size: 12px;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.15s;
}
.st-filter-btn:hover  { color: var(--text); border-color: rgba(255,255,255,0.2); }
.st-filter-btn.active { background: var(--accent); color: #fff; border-color: transparent; }
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font-mono, monospace);
}
</style>

<script>
let _currentStatusFilter = 'all';

function filterStatus(key, btn) {
  _currentStatusFilter = key;
  document.querySelectorAll('.st-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderStatusList();
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'watchlist') renderWatchlist();
  if (name === 'history')   renderHistory();
  if (name === 'status')    renderStatusList();
}

function renderStatusList() {
  const el = document.getElementById('statusContainer');
  if (!el) return;

  const STATUS_OPTIONS = [
    { key: 'watching',  label: 'Watching',      emoji: '▶',  color: '#4caf7d' },
    { key: 'plan',      label: 'Plan to Watch', emoji: '📌', color: '#64b5f6' },
    { key: 'completed', label: 'Completed',     emoji: '✅', color: '#a5d6a7' },
    { key: 'dropped',   label: 'Dropped',       emoji: '🚫', color: '#e57373' },
  ];

  function lsGet(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}}
  const statuses = lsGet('animeku_status', {});
  let entries = Object.entries(statuses).map(([slug, v]) => ({ slug, ...v }));

  if (_currentStatusFilter !== 'all') {
    entries = entries.filter(e => e.key === _currentStatusFilter);
  }

  entries.sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));

  if (!entries.length) {
    el.innerHTML = `<div class="empty-state">
      <div style="font-size:48px;text-align:center;margin-bottom:16px;opacity:0.3">📋</div>
      <h3>${_currentStatusFilter === 'all' ? 'Belum ada status' : 'Tidak ada anime dengan status ini'}</h3>
      <p>Tandai anime dari halaman detail!</p>
    </div>`;
    return;
  }

  el.innerHTML = `<div class="anime-grid lg">${entries.map(a => {
    const opt = STATUS_OPTIONS.find(o => o.key === a.key);
    const badge = opt
      ? `<span class="status-badge" style="background:${opt.color}22;color:${opt.color};border:1px solid ${opt.color}44">${opt.emoji} ${opt.label}</span>`
      : '';
    return `<div style="position:relative">
      <a href="/anime/${a.slug}" class="anime-card">
        <div class="card-poster">
          <img src="${a.poster||''}" alt="${a.title||''}" loading="lazy" onerror="this.src='/static/img/placeholder.svg'">
          <div class="card-overlay"><div class="play-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg></div></div>
          ${a.type ? `<span class="card-badge type">${a.type}</span>` : ''}
          <button class="wl-delete-btn" onclick="event.preventDefault();event.stopPropagation();removeStatus('${a.slug}')" title="Hapus status"><i class="fas fa-times"></i></button>
        </div>
        <div class="card-info">
          <div class="card-title">${a.title||a.slug}</div>
          <div class="card-meta" style="margin-top:5px">${badge}</div>
        </div>
      </a>
    </div>`;
  }).join('')}</div>`;
}

function removeStatus(slug) {
  function lsGet(k,d){try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}}
  function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
  const s = lsGet('animeku_status', {});
  delete s[slug];
  lsSet('animeku_status', s);
  renderStatusList();
}

function clearActive() {
  const activeTab = document.querySelector('.tab-pane.active')?.id;
  if (activeTab === 'tab-history')   clearHistory();
  else if (activeTab === 'tab-status') {
    if (!confirm('Hapus semua status tracking?')) return;
    try { localStorage.removeItem('animeku_status'); } catch {}
    renderStatusList();
    // showToast tidak tersedia sebelum main.js, pakai setTimeout
    setTimeout(() => typeof showToast === 'function' && showToast('Status dikosongkan'), 10);
  }
  else clearWatchlist();
}
</script>
{% endblock %}

{% block scripts %}
<script>
  renderWatchlist();
  renderHistory();
  renderStatusList();
</script>
{% endblock %}
