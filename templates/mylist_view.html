{% extends "base.html" %}
{% block title %}List Anime — Animeku.id{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.mlv-page { max-width: 620px; margin: 0 auto; padding: 80px 16px 100px; }
.mlv-back { display: inline-flex; align-items: center; gap: 7px; color: var(--text2); font-size: 13px; font-weight: 700; background: var(--card); border: 1px solid var(--border); padding: 7px 14px; border-radius: var(--radius); text-decoration: none; transition: all 0.2s; margin-bottom: 20px; }
.mlv-back:hover { border-color: var(--accent); color: var(--text); }

.mlv-header { background: linear-gradient(135deg, rgba(230,57,70,0.3), rgba(100,40,130,0.3)); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 14px; }
.mlv-avatar { width: 50px; height: 50px; border-radius: 12px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-size: 22px; color: #fff; font-weight: 700; flex-shrink: 0; }
.mlv-username { font-family: var(--font-head); font-size: 22px; letter-spacing: 1px; color: var(--text); margin-bottom: 4px; }
.mlv-meta { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
.mlv-count { background: rgba(255,255,255,0.08); padding: 2px 10px; border-radius: 20px; }

.mlv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.mlv-slot { aspect-ratio: 2/3; border-radius: var(--radius); overflow: hidden; position: relative; background: var(--bg2); border: 1px solid var(--border); transition: all 0.2s; cursor: pointer; }
.mlv-slot:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.5); border-color: rgba(230,57,70,0.4); }
.mlv-slot img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
.mlv-slot:hover img { transform: scale(1.04); }
.mlv-slot-ov { position: absolute; inset: 0; background: linear-gradient(to top, rgba(9,11,15,0.9) 0%, transparent 55%); display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; pointer-events: none; }
.mlv-ov-rank { background: var(--accent); color: #fff; font-family: var(--font-head); font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-bottom: 3px; width: fit-content; }
.mlv-ov-title { font-size: 10px; color: #fff; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-weight: 700; }
.mlv-ov-tap { font-size: 9px; color: rgba(255,255,255,0.5); margin-top: 3px; display: flex; align-items: center; gap: 3px; }

.mlv-actions { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.mlv-actions-label { font-size: 13px; color: var(--text3); font-weight: 600; }
.mlv-btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 700; text-decoration: none; transition: opacity 0.2s; cursor: pointer; border: none; font-family: var(--font-body); }
.mlv-btn-accent { background: var(--accent); color: #fff; }
.mlv-btn-ghost { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text2); }
.mlv-btn:hover { opacity: 0.85; }

.mlv-loading { text-align: center; padding: 80px 20px; color: var(--text3); }
.mlv-spinner { font-size: 28px; color: var(--accent); margin-bottom: 12px; display: block; }
.mlv-not-found { text-align: center; padding: 80px 20px; color: var(--text3); }
.mlv-not-found .code { font-family: var(--font-head); font-size: 60px; color: var(--accent); }

/* Detail Modal */
.ml-modal-backdrop { position: fixed; inset: 0; z-index: 5000; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; padding: 16px; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.ml-modal-backdrop.open { opacity: 1; pointer-events: all; }
.ml-modal { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 60px rgba(0,0,0,0.7); transform: translateY(20px) scale(0.96); transition: transform 0.25s cubic-bezier(.34,1.56,.64,1); position: relative; }
.ml-modal-backdrop.open .ml-modal { transform: translateY(0) scale(1); }
.ml-modal-close { position: absolute; top: 12px; right: 12px; width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 1px solid var(--border); color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all 0.15s; z-index: 10; }
.ml-modal-close:hover { background: var(--accent); color: #fff; }
.ml-modal-banner { width: 100%; height: 150px; position: relative; border-radius: var(--radius-lg) var(--radius-lg) 0 0; overflow: hidden; }
.ml-modal-banner img { width: 100%; height: 100%; object-fit: cover; object-position: top; filter: brightness(0.5); }
.ml-modal-banner-grad { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 30%, var(--card) 100%); }
.ml-modal-banner-rank { position: absolute; top: 12px; left: 12px; background: var(--accent); color: #fff; font-size: 11px; font-weight: 800; padding: 3px 12px; border-radius: 20px; font-family: var(--font-head); }
.ml-modal-body { display: flex; gap: 14px; padding: 0 16px 8px; margin-top: -48px; position: relative; }
.ml-modal-poster { width: 84px; flex-shrink: 0; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); box-shadow: 0 8px 24px rgba(0,0,0,0.5); align-self: flex-start; z-index: 1; }
.ml-modal-poster img { width: 100%; display: block; aspect-ratio: 2/3; object-fit: cover; }
.ml-modal-info { flex: 1; min-width: 0; padding-top: 52px; }
.ml-modal-badge-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }
.ml-badge { font-size: 10px; padding: 3px 9px; border-radius: 20px; font-weight: 700; }
.ml-badge-tv { background: rgba(77,171,247,0.2); color: #4dabf7; border: 1px solid rgba(77,171,247,0.3); }
.ml-badge-movie { background: rgba(204,93,232,0.2); color: #cc5de8; border: 1px solid rgba(204,93,232,0.3); }
.ml-badge-type { background: rgba(230,57,70,0.2); color: var(--accent); border: 1px solid rgba(230,57,70,0.3); }
.ml-badge-airing { background: rgba(76,175,125,0.2); color: #4caf7d; border: 1px solid rgba(76,175,125,0.3); }
.ml-badge-fin { background: rgba(255,255,255,0.06); color: var(--text3); border: 1px solid var(--border); }
.ml-modal-title { font-family: var(--font-head); font-size: 17px; letter-spacing: 0.5px; color: var(--text); line-height: 1.2; }
.ml-modal-title-en { font-size: 11px; color: var(--text3); margin-top: 2px; }
.ml-modal-stats { display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 16px; margin: 8px 16px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); }
.ml-stat { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 55px; }
.ml-stat-label { font-size: 9px; color: var(--text3); letter-spacing: 0.07em; text-transform: uppercase; font-weight: 700; }
.ml-stat-val { font-size: 14px; font-weight: 800; color: var(--text); font-family: var(--font-head); }
.ml-stat-val.gold { color: #fbbf24; }
.ml-modal-lower { padding: 0 16px 16px; }
.ml-modal-genres { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.ml-genre-tag { font-size: 10px; padding: 3px 10px; border-radius: 20px; background: rgba(230,57,70,0.08); color: var(--accent); border: 1px solid rgba(230,57,70,0.2); font-weight: 600; }
.ml-synopsis { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
.ml-synopsis.expanded { -webkit-line-clamp: unset; }
.ml-syn-toggle { font-size: 12px; color: var(--accent); cursor: pointer; background: none; border: none; padding: 0; margin-bottom: 10px; font-family: var(--font-body); font-weight: 700; }
.ml-modal-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 12px; font-size: 12px; margin-bottom: 10px; }
.ml-meta-item { display: flex; flex-direction: column; gap: 1px; }
.ml-meta-label { font-size: 9px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; }
.ml-meta-val { color: var(--text2); font-weight: 600; }
.ml-watch-link { display: inline-flex; align-items: center; gap: 7px; background: var(--accent); color: #fff; border-radius: var(--radius); padding: 9px 16px; font-weight: 700; font-size: 13px; text-decoration: none; transition: opacity 0.2s; }
.ml-watch-link:hover { opacity: 0.88; }
.ml-modal-loading { display: flex; align-items: center; justify-content: center; padding: 48px; color: var(--text3); gap: 10px; font-size: 13px; }
</style>
{% endblock %}

{% block content %}
<div class="mlv-page">
  <a href="/mylist/jelajahi" class="mlv-back"><i class="fa-solid fa-arrow-left"></i> Jelajahi</a>
  <div id="mlvContent">
    <div class="mlv-loading">
      <span class="mlv-spinner"><i class="fa-solid fa-spinner fa-spin"></i></span>
      <p style="font-size:13px">Memuat daftar…</p>
    </div>
  </div>
</div>

<div class="ml-modal-backdrop" id="mlvModalBackdrop" onclick="if(event.target===this)mlvCloseModal()">
  <div class="ml-modal">
    <button class="ml-modal-close" onclick="mlvCloseModal()"><i class="fa-solid fa-xmark"></i></button>
    <div id="mlvModalBody"><div class="ml-modal-loading"><i class="fa-solid fa-spinner fa-spin"></i> Memuat…</div></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const mlvListId = "{{ list_id }}";
let mlvAnimeList = [];
const mlvDetailCache = {};

function mlvAgo(d) {
  const m = Math.floor((Date.now()-new Date(d))/60000);
  if (m<1) return 'baru saja';
  if (m<60) return m+' menit lalu';
  const h=Math.floor(m/60);
  if (h<24) return h+' jam lalu';
  return Math.floor(h/24)+' hari lalu';
}

async function mlvLoad() {
  try {
    const res = await fetch('/api/mylist/list/' + mlvListId);
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (data.error) throw new Error();
    mlvRender(data);
  } catch {
    document.getElementById('mlvContent').innerHTML = `
      <div class="mlv-not-found">
        <div class="code">404</div>
        <p style="color:var(--text2);font-size:14px;margin-bottom:14px">Daftar ini tidak ditemukan 😢</p>
        <a href="/mylist/jelajahi" class="mlv-btn mlv-btn-ghost">Kembali ke Jelajahi</a>
      </div>`;
  }
}

function mlvRender(data) {
  document.title = 'List ' + data.username + ' — Animeku.id';
  mlvAnimeList = data.anime_list || [];
  const init  = (data.username || '?').charAt(0).toUpperCase();
  const slots = mlvAnimeList.map((a, i) => `
    <div class="mlv-slot" onclick="mlvOpenModal(${i})">
      <img src="${a.image}" alt="" loading="lazy">
      <div class="mlv-slot-ov">
        <div class="mlv-ov-rank">#${i+1}</div>
        <div class="mlv-ov-title">${a.title}</div>
        <div class="mlv-ov-tap"><i class="fa-solid fa-circle-info"></i> Tap untuk detail</div>
      </div>
    </div>`).join('');

  document.getElementById('mlvContent').innerHTML = `
    <div class="mlv-header">
      <div class="mlv-avatar">${init}</div>
      <div>
        <div class="mlv-username">List ${data.username} 🎌</div>
        <div class="mlv-meta"><i class="fa-regular fa-clock"></i> ${mlvAgo(data.created_at)} <span class="mlv-count">${mlvAnimeList.length} anime</span></div>
      </div>
    </div>
    <div class="mlv-grid">${slots}</div>
    <div class="mlv-actions">
      <span class="mlv-actions-label">Bagikan ke temanmu! 👇</span>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="mlv-btn mlv-btn-accent" onclick="mlvCopyLink()"><i class="fa-solid fa-link"></i> Salin Link</button>
        <a href="/mylist" class="mlv-btn mlv-btn-ghost"><i class="fa-solid fa-plus"></i> Buat Punyaku</a>
      </div>
    </div>`;
}

async function mlvOpenModal(idx) {
  const anime = mlvAnimeList[idx]; if (!anime) return;
  const body = document.getElementById('mlvModalBody');
  body.innerHTML = '<div class="ml-modal-loading"><i class="fa-solid fa-spinner fa-spin"></i> Memuat detail…</div>';
  document.getElementById('mlvModalBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
  const id = anime.mal_id;
  if (mlvDetailCache[id]) { mlvRenderModal(mlvDetailCache[id], idx); return; }
  try {
    const r = await fetch('https://api.jikan.moe/v4/anime/' + id);
    const j = await r.json();
    mlvDetailCache[id] = j.data;
    mlvRenderModal(j.data, idx);
  } catch { body.innerHTML = '<div class="ml-modal-loading">Gagal memuat 😢</div>'; }
}

function mlvBadgeClass(type) {
  if (!type) return 'ml-badge-type';
  const t = type.toLowerCase();
  if (t==='tv') return 'ml-badge-tv';
  if (t==='movie') return 'ml-badge-movie';
  return 'ml-badge-type';
}

function mlvRenderModal(d, idx) {
  const poster  = d.images?.jpg?.large_image_url || '';
  const genres  = [...(d.genres||[]), ...(d.themes||[])].map(g=>`<span class="ml-genre-tag">${g.name}</span>`).join('');
  const synopsis = (d.synopsis||'Tidak ada sinopsis.').replace('[Written by MAL Rewrite]','').trim();
  const statusCls = d.airing ? 'ml-badge-airing' : 'ml-badge-fin';
  document.getElementById('mlvModalBody').innerHTML = `
    <div class="ml-modal-banner">
      <img src="${poster}" alt="">
      <div class="ml-modal-banner-grad"></div>
      <div class="ml-modal-banner-rank">🏆 #${idx+1}</div>
    </div>
    <div class="ml-modal-body">
      <div class="ml-modal-poster"><img src="${poster}" alt=""></div>
      <div class="ml-modal-info">
        <div class="ml-modal-badge-row">
          ${d.type ? `<span class="ml-badge ${mlvBadgeClass(d.type)}">${d.type}</span>` : ''}
          ${d.status ? `<span class="ml-badge ${statusCls}">${d.status}</span>` : ''}
        </div>
        <div class="ml-modal-title">${d.title}</div>
        ${d.title_english && d.title_english !== d.title ? `<div class="ml-modal-title-en">${d.title_english}</div>` : ''}
      </div>
    </div>
    <div class="ml-modal-stats">
      ${d.score ? `<div class="ml-stat"><span class="ml-stat-label">Score</span><span class="ml-stat-val gold">⭐ ${d.score}</span></div>` : ''}
      ${d.rank ? `<div class="ml-stat"><span class="ml-stat-label">Rank</span><span class="ml-stat-val">#${d.rank}</span></div>` : ''}
      ${d.popularity ? `<div class="ml-stat"><span class="ml-stat-label">Populer</span><span class="ml-stat-val">#${d.popularity}</span></div>` : ''}
      ${d.episodes ? `<div class="ml-stat"><span class="ml-stat-label">Episode</span><span class="ml-stat-val">${d.episodes}</span></div>` : ''}
    </div>
    <div class="ml-modal-lower">
      ${genres ? `<div class="ml-modal-genres">${genres}</div>` : ''}
      <div class="ml-synopsis" id="mlvSyn">${synopsis}</div>
      <button class="ml-syn-toggle" id="mlvSynToggle" onclick="mlvToggleSyn()">Baca selengkapnya ▾</button>
      <div class="ml-modal-meta">
        <div class="ml-meta-item"><span class="ml-meta-label">Tayang</span><span class="ml-meta-val">${d.aired?.string||'—'}</span></div>
        <div class="ml-meta-item"><span class="ml-meta-label">Durasi</span><span class="ml-meta-val">${d.duration||'—'}</span></div>
        <div class="ml-meta-item"><span class="ml-meta-label">Studio</span><span class="ml-meta-val">${(d.studios||[]).map(s=>s.name).join(', ')||'—'}</span></div>
        <div class="ml-meta-item"><span class="ml-meta-label">Sumber</span><span class="ml-meta-val">${d.source||'—'}</span></div>
      </div>
      <a href="/search?q=${encodeURIComponent(d.title)}" class="ml-watch-link"><i class="fa-solid fa-play"></i> Tonton di Animeku.ID</a>
    </div>`;
}
function mlvToggleSyn() {
  const el = document.getElementById('mlvSyn');
  const btn = document.getElementById('mlvSynToggle');
  el.classList.toggle('expanded');
  btn.textContent = el.classList.contains('expanded') ? 'Sembunyikan ▴' : 'Baca selengkapnya ▾';
}
function mlvCloseModal() {
  document.getElementById('mlvModalBackdrop').classList.remove('open');
  document.body.style.overflow = '';
}
function mlvCopyLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    if (window.showToast) showToast('Link disalin! 🔗', 'success');
  });
}
document.addEventListener('keydown', e => { if (e.key==='Escape') mlvCloseModal(); });
mlvLoad();
</script>
{% endblock %}
