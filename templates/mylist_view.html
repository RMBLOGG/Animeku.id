{% extends "base.html" %}
{% block title %}List Anime — Animeku.id{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
.mlv-page { max-width: 620px; margin: 0 auto; padding: 20px 16px 100px; }
.mlv-back { display: inline-flex; align-items: center; gap: 7px; color: var(--text2); font-size: 13px; font-weight: 700; background: var(--card); border: 1px solid var(--border); padding: 7px 14px; border-radius: var(--radius); text-decoration: none; transition: all 0.2s; margin-bottom: 20px; }
.mlv-back:hover { border-color: var(--accent); color: var(--text); }

.mlv-header { background: linear-gradient(135deg, rgba(230,57,70,0.3), rgba(100,40,130,0.3)); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 14px; }
.mlv-avatar { width: 50px; height: 50px; border-radius: 12px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-family: var(--font-head); font-size: 22px; color: #fff; font-weight: 700; flex-shrink: 0; }
.mlv-username { font-family: var(--font-head); font-size: 22px; letter-spacing: 1px; color: var(--text); margin-bottom: 4px; }
.mlv-meta { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
.mlv-count { background: rgba(255,255,255,0.08); padding: 2px 10px; border-radius: 20px; }

.mlv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.mlv-slot { aspect-ratio: 2/3; border-radius: var(--radius); overflow: hidden; position: relative; background: var(--bg2); border: 1px solid var(--border); transition: all 0.2s; cursor: pointer; }
.mlv-slot:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.5); border-color: rgba(230,57,70,0.4); }
.mlv-slot img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
.mlv-slot:hover img { transform: scale(1.04); }
.mlv-slot-ov { position: absolute; inset: 0; background: linear-gradient(to top, rgba(9,11,15,0.9) 0%, transparent 55%); display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; pointer-events: none; }
.mlv-ov-rank { background: var(--accent); color: #fff; font-family: var(--font-head); font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-bottom: 3px; width: fit-content; }
.mlv-ov-title { font-size: 10px; color: #fff; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-weight: 700; }
.mlv-ov-tap { font-size: 9px; color: rgba(255,255,255,0.5); margin-top: 3px; display: flex; align-items: center; gap: 3px; }

.mlv-actions { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.mlv-actions-label { font-size: 13px; color: var(--text3); font-weight: 600; }
.mlv-btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 700; text-decoration: none; transition: opacity 0.2s; cursor: pointer; border: none; font-family: var(--font-body); }
.mlv-btn-accent { background: var(--accent); color: #fff; }
.mlv-btn-ghost { background: rgba(255,255,255,0.06); border: 1px solid var(--border); color: var(--text2); }
.mlv-btn:hover { opacity: 0.85; }

.mlv-loading { text-align: center; padding: 80px 20px; color: var(--text3); }
.mlv-spinner { font-size: 28px; color: var(--accent); margin-bottom: 12px; display: block; }
.mlv-not-found { text-align: center; padding: 80px 20px; color: var(--text3); }
.mlv-not-found .code { font-family: var(--font-head); font-size: 60px; color: var(--accent); }

/* ── Detail Modal ── */
.ml-modal-backdrop {
  position: fixed; inset: 0; z-index: 5000;
  background: rgba(0,0,0,0.8); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 16px; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.ml-modal-backdrop.open { opacity: 1; pointer-events: all; }
.ml-modal {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); width: 100%; max-width: 520px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 24px 60px rgba(0,0,0,0.7);
  transform: translateY(20px) scale(0.96);
  transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
  position: relative;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.ml-modal-backdrop.open .ml-modal { transform: translateY(0) scale(1); }
.ml-modal-close {
  position: absolute; top: 12px; right: 12px;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(0,0,0,0.5); border: 1px solid var(--border);
  color: #fff; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  font-size: 13px; transition: all 0.15s; z-index: 10;
}
.ml-modal-close:hover { background: var(--accent); }

/* Hero section */
.ml-hero {
  position: relative; border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  overflow: hidden; background: var(--bg2);
}
.ml-hero-backdrop {
  position: absolute; inset: 0;
  background-size: cover; background-position: center top;
  filter: blur(28px) brightness(0.2) saturate(1.4);
  transform: scale(1.1); z-index: 0;
}
.ml-hero-rank {
  position: absolute; top: 12px; left: 12px; z-index: 2;
  background: var(--accent); color: #fff;
  font-size: 11px; font-weight: 800;
  padding: 3px 12px; border-radius: 20px;
  font-family: var(--font-head);
}
.ml-hero-inner {
  position: relative; z-index: 1;
  display: flex; gap: 16px; padding: 36px 16px 20px;
  align-items: flex-start;
}
.ml-hero-poster {
  width: 100px; flex-shrink: 0;
  border-radius: 10px; overflow: hidden;
  box-shadow: 0 12px 40px rgba(0,0,0,0.7);
  border: 2px solid rgba(255,255,255,0.08);
}
.ml-hero-poster img { width: 100%; display: block; aspect-ratio: 2/3; object-fit: cover; }
.ml-hero-meta { flex: 1; min-width: 0; }

.ml-title {
  font-family: var(--font-head); font-size: 18px;
  letter-spacing: 0.5px; color: var(--text);
  line-height: 1.2; margin-bottom: 3px;
}
.ml-title-alt { font-size: 11px; color: var(--text3); margin-bottom: 10px; font-style: italic; }

.ml-stats-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.ml-stat-pill {
  display: flex; align-items: center; gap: 4px;
  font-size: 12px; color: var(--text2);
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  padding: 3px 9px; border-radius: 20px;
}
.ml-stat-pill.score { color: #fbbf24; border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.08); }
.ml-stat-pill.airing { color: #4caf7d; }

.ml-genres { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
.ml-genre-tag {
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
  background: rgba(230,57,70,0.1);
  border: 1px solid rgba(230,57,70,0.25);
  color: var(--accent);
}
.ml-watch-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px; background: var(--accent); color: #fff;
  border-radius: var(--radius); font-size: 13px; font-weight: 700;
  text-decoration: none; transition: opacity 0.2s;
}
.ml-watch-btn:hover { opacity: 0.85; }

/* Ranking row */
.ml-ranking-row {
  display: flex; gap: 8px; overflow-x: auto;
  padding: 12px 16px; border-top: 1px solid var(--border);
  scrollbar-width: none;
}
.ml-ranking-row::-webkit-scrollbar { display: none; }
.ml-rank-item {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 12px;
  white-space: nowrap; flex-shrink: 0; font-size: 12px;
}
.ml-rank-num { font-family: var(--font-head); font-size: 16px; color: var(--accent); }
.ml-rank-label { color: var(--text3); font-size: 10px; }

/* Sections */
.ml-section {
  border-top: 1px solid var(--border);
  padding: 16px;
}
.ml-section-title {
  font-family: var(--font-head); font-size: 14px;
  letter-spacing: 1px; color: var(--accent);
  margin-bottom: 12px; display: flex; align-items: center; gap: 7px;
}

/* Synopsis */
.ml-synopsis {
  font-size: 13px; color: var(--text2); line-height: 1.75;
  position: relative; overflow: hidden; max-height: 110px;
  transition: max-height 0.4s ease;
}
.ml-synopsis.expanded { max-height: 9999px; }
.ml-syn-fade {
  position: absolute; bottom: 0; left: 0; right: 0; height: 44px;
  background: linear-gradient(to bottom, transparent, var(--card));
  pointer-events: none; transition: opacity 0.3s;
}
.ml-synopsis.expanded .ml-syn-fade { opacity: 0; }
.ml-read-more {
  margin-top: 8px; color: var(--accent); font-size: 12px;
  font-weight: 700; cursor: pointer; display: inline-flex;
  align-items: center; gap: 4px; background: none; border: none;
  font-family: var(--font-body); padding: 0;
}

/* Info grid */
.ml-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.ml-info-label { font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text3); margin-bottom: 3px; }
.ml-info-value { font-size: 13px; color: var(--text2); }
.ml-info-value a { color: var(--accent); }

/* Characters */
.ml-chars-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.ml-char-card {
  display: flex; gap: 8px; background: var(--bg2);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 8px; align-items: center; transition: border-color 0.2s;
}
.ml-char-card:hover { border-color: rgba(230,57,70,0.3); }
.ml-char-img { width: 40px; height: 52px; object-fit: cover; border-radius: 5px; flex-shrink: 0; background: var(--border); }
.ml-char-name { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ml-char-role { font-size: 10px; color: var(--text3); }
.ml-va-wrap { display: flex; align-items: center; gap: 4px; margin-top: 3px; }
.ml-va-img { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; background: var(--border); }
.ml-va-name { font-size: 10px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Trailer */
.ml-trailer-wrap { position: relative; padding-bottom: 56.25%; border-radius: var(--radius); overflow: hidden; background: var(--bg); }
.ml-trailer-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

/* Loading */
.ml-modal-loading { display: flex; align-items: center; justify-content: center; padding: 48px; color: var(--text3); gap: 10px; font-size: 13px; }
</style>
{% endblock %}

{% block content %}
<div class="mlv-page">
  
  <div id="mlvContent">
    <div class="mlv-loading">
      <span class="mlv-spinner"><i class="fa-solid fa-spinner fa-spin"></i></span>
      <p style="font-size:13px">Memuat daftar…</p>
    </div>
  </div>
</div>

<div class="ml-modal-backdrop" id="mlvModalBackdrop" onclick="if(event.target===this)mlvCloseModal()">
  <div class="ml-modal">
    <button class="ml-modal-close" onclick="mlvCloseModal()"><i class="fa-solid fa-xmark"></i></button>
    <div id="mlvModalBody"><div class="ml-modal-loading"><i class="fa-solid fa-spinner fa-spin"></i> Memuat…</div></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const mlvListId = "{{ list_id }}";
let mlvAnimeList = [];
const mlvDetailCache = {};

function mlvAgo(d) {
  const m = Math.floor((Date.now()-new Date(d))/60000);
  if (m<1) return 'baru saja';
  if (m<60) return m+' menit lalu';
  const h=Math.floor(m/60);
  if (h<24) return h+' jam lalu';
  return Math.floor(h/24)+' hari lalu';
}

async function mlvLoad() {
  try {
    const res = await fetch('/api/mylist/list/' + mlvListId);
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (data.error) throw new Error();
    mlvRender(data);
  } catch {
    document.getElementById('mlvContent').innerHTML = `
      <div class="mlv-not-found">
        <div class="code">404</div>
        <p style="color:var(--text2);font-size:14px;margin-bottom:14px">Daftar ini tidak ditemukan 😢</p>
        <a href="/mylist/jelajahi" class="mlv-btn mlv-btn-ghost">Kembali ke Jelajahi</a>
      </div>`;
  }
}

function mlvRender(data) {
  document.title = 'List ' + data.username + ' — Animeku.id';
  mlvAnimeList = data.anime_list || [];
  const init  = (data.username || '?').charAt(0).toUpperCase();
  const slots = mlvAnimeList.map((a, i) => `
    <div class="mlv-slot" onclick="mlvOpenModal(${i})">
      <img src="${a.image}" alt="" loading="lazy">
      <div class="mlv-slot-ov">
        <div class="mlv-ov-rank">#${i+1}</div>
        <div class="mlv-ov-title">${a.title}</div>
        <div class="mlv-ov-tap"><i class="fa-solid fa-circle-info"></i> Tap untuk detail</div>
      </div>
    </div>`).join('');

  document.getElementById('mlvContent').innerHTML = `
    <div class="mlv-header">
      <div class="mlv-avatar">${init}</div>
      <div>
        <div class="mlv-username">List ${data.username} 🎌</div>
        <div class="mlv-meta"><i class="fa-regular fa-clock"></i> ${mlvAgo(data.created_at)} <span class="mlv-count">${mlvAnimeList.length} anime</span></div>
      </div>
    </div>
    <div class="mlv-grid">${slots}</div>
    <div class="mlv-actions">
      <span class="mlv-actions-label">Bagikan ke temanmu! 👇</span>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="mlv-btn mlv-btn-accent" onclick="mlvCopyLink()"><i class="fa-solid fa-link"></i> Salin Link</button>
        <a href="/mylist" class="mlv-btn mlv-btn-ghost"><i class="fa-solid fa-plus"></i> Buat Punyaku</a>
      </div>
    </div>`;
}

async function mlvOpenModal(idx) {
  const anime = mlvAnimeList[idx]; if (!anime) return;
  const body = document.getElementById('mlvModalBody');
  body.innerHTML = '<div class="ml-modal-loading"><i class="fa-solid fa-spinner fa-spin"></i> Memuat detail…</div>';
  document.getElementById('mlvModalBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
  const id = anime.mal_id;
  if (mlvDetailCache[id]) { mlvRenderModal(mlvDetailCache[id], idx); return; }
  try {
    const [resDetail, resChars] = await Promise.all([
      fetch('https://api.jikan.moe/v4/anime/' + id),
      fetch('https://api.jikan.moe/v4/anime/' + id + '/characters')
    ]);
    const { data: d } = await resDetail.json();
    const { data: chars } = await resChars.json();
    mlvDetailCache[id] = { d, chars };
    mlvRenderModal({ d, chars }, idx);
  } catch { body.innerHTML = '<div class="ml-modal-loading">Gagal memuat 😢</div>'; }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function infoItem(label, val) {
  return `<div><div class="ml-info-label">${label}</div><div class="ml-info-value">${val}</div></div>`;
}

function mlvRenderModal({ d, chars }, idx) {
  if (!d) { document.getElementById('mlvModalBody').innerHTML = '<div class="ml-modal-loading">Data tidak ditemukan 😢</div>'; return; }

  const poster   = d.images?.webp?.large_image_url || d.images?.jpg?.large_image_url || '';
  const genres   = [...(d.genres||[]), ...(d.themes||[])].slice(0,6);
  const synopsis = (d.synopsis||'Tidak ada sinopsis.').replace('[Written by MAL Rewrite]','').trim();
  const searchSlug = encodeURIComponent(d.title);

  const mainChars = (chars||[]).filter(c=>c.role==='Main').slice(0,6);
  const supChars  = (chars||[]).filter(c=>c.role==='Supporting').slice(0,6);
  const allChars  = [...mainChars, ...supChars].slice(0,12);

  document.getElementById('mlvModalBody').innerHTML = `
    <!-- Hero -->
    <div class="ml-hero">
      <div class="ml-hero-backdrop" style="background-image:url('${poster}')"></div>
      <div class="ml-hero-rank">🏆 #${idx+1}</div>
      <div class="ml-hero-inner">
        <div class="ml-hero-poster">
          <img src="${poster}" alt="" onerror="this.src='/static/img/placeholder.svg'">
        </div>
        <div class="ml-hero-meta">
          <div class="ml-title">${esc(d.title)}</div>
          ${d.title_english && d.title_english !== d.title ? `<div class="ml-title-alt">${esc(d.title_english)}</div>` : ''}
          <div class="ml-stats-row">
            ${d.score ? `<span class="ml-stat-pill score">⭐ ${d.score}</span>` : ''}
            ${d.episodes ? `<span class="ml-stat-pill">▶ ${d.episodes} Ep</span>` : ''}
            ${d.type ? `<span class="ml-stat-pill">${esc(d.type)}</span>` : ''}
            ${d.status ? `<span class="ml-stat-pill ${d.airing?'airing':''}">${esc(d.status)}</span>` : ''}
          </div>
          <div class="ml-genres">
            ${genres.map(g=>`<span class="ml-genre-tag">${esc(g.name)}</span>`).join('')}
          </div>
          <a href="/search?q=${searchSlug}" class="ml-watch-btn">
            <i class="fa-solid fa-play"></i> Tonton di Animeku.ID
          </a>
        </div>
      </div>
    </div>

    <!-- Ranking row -->
    ${d.rank || d.popularity ? `
    <div class="ml-ranking-row">
      ${d.rank ? `<div class="ml-rank-item"><span class="ml-rank-num">#${d.rank}</span><span class="ml-rank-label">Ranked</span></div>` : ''}
      ${d.popularity ? `<div class="ml-rank-item"><span class="ml-rank-num">#${d.popularity}</span><span class="ml-rank-label">Populer</span></div>` : ''}
      ${d.members ? `<div class="ml-rank-item"><span class="ml-rank-num">${(d.members/1000).toFixed(0)}k</span><span class="ml-rank-label">Members</span></div>` : ''}
      ${d.favorites ? `<div class="ml-rank-item"><span class="ml-rank-num">${(d.favorites/1000).toFixed(0)}k</span><span class="ml-rank-label">Favorit</span></div>` : ''}
      ${d.scored_by ? `<div class="ml-rank-item"><span class="ml-rank-num">${(d.scored_by/1000).toFixed(0)}k</span><span class="ml-rank-label">Votes</span></div>` : ''}
    </div>` : ''}

    <!-- Synopsis -->
    ${synopsis ? `
    <div class="ml-section">
      <div class="ml-section-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Sinopsis
      </div>
      <div class="ml-synopsis" id="mlvSyn">
        ${esc(synopsis)}
        <div class="ml-syn-fade"></div>
      </div>
      <button class="ml-read-more" id="mlvSynToggle" onclick="mlvToggleSyn()">
        Baca selengkapnya
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" id="mlvSynArrow"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>` : ''}

    <!-- Info -->
    <div class="ml-section">
      <div class="ml-section-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Informasi
      </div>
      <div class="ml-info-grid">
        ${d.status ? infoItem('Status', `<span style="color:${d.airing?'#4caf7d':'var(--text2)'}">${esc(d.status)}</span>`) : ''}
        ${d.season && d.year ? infoItem('Season', `${esc(d.season.charAt(0).toUpperCase()+d.season.slice(1))} ${d.year}`) : ''}
        ${d.aired?.string ? infoItem('Tayang', esc(d.aired.string)) : ''}
        ${d.duration ? infoItem('Durasi', esc(d.duration)) : ''}
        ${d.studios?.length ? infoItem('Studio', d.studios.map(s=>`<a href="/search?q=${encodeURIComponent(s.name)}">${esc(s.name)}</a>`).join(', ')) : ''}
        ${d.source ? infoItem('Sumber', esc(d.source)) : ''}
        ${d.rating ? infoItem('Rating', esc(d.rating)) : ''}
        ${d.broadcast?.string ? infoItem('Jadwal', esc(d.broadcast.string)) : ''}
      </div>
    </div>

    <!-- Characters -->
    ${allChars.length ? `
    <div class="ml-section">
      <div class="ml-section-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Karakter
      </div>
      <div class="ml-chars-grid">
        ${allChars.map(c => {
          const charImg = c.character?.images?.jpg?.image_url || '';
          const va = (c.voice_actors||[]).find(v=>v.language==='Japanese');
          const vaImg = va?.person?.images?.jpg?.image_url || '';
          const vaName = va?.person?.name || '';
          return `<div class="ml-char-card">
            <img class="ml-char-img" src="${charImg||'/static/img/placeholder.svg'}" alt="" onerror="this.src='/static/img/placeholder.svg'" loading="lazy">
            <div style="flex:1;min-width:0">
              <div class="ml-char-name">${esc(c.character?.name||'')}</div>
              <div class="ml-char-role">${esc(c.role||'')}</div>
              ${vaName ? `<div class="ml-va-wrap">
                ${vaImg ? `<img class="ml-va-img" src="${vaImg}" alt="" onerror="this.style.display='none'" loading="lazy">` : ''}
                <span class="ml-va-name">${esc(vaName)}</span>
              </div>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}

    <!-- Trailer -->
    ${d.trailer?.embed_url ? `
    <div class="ml-section">
      <div class="ml-section-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
        Trailer
      </div>
      <div class="ml-trailer-wrap">
        <iframe src="${d.trailer.embed_url}" allowfullscreen loading="lazy"></iframe>
      </div>
    </div>` : ''}
  `;
}

function mlvToggleSyn() {
  const el  = document.getElementById('mlvSyn');
  const arr = document.getElementById('mlvSynArrow');
  const btn = document.getElementById('mlvSynToggle');
  const open = el.classList.toggle('expanded');
  arr.style.transform = open ? 'rotate(180deg)' : '';
  btn.childNodes[0].textContent = open ? 'Sembunyikan ' : 'Baca selengkapnya ';
}

function mlvCloseModal() {
  document.getElementById('mlvModalBackdrop').classList.remove('open');
  document.body.style.overflow = '';
}

function mlvCopyLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    if (window.showToast) showToast('Link disalin! 🔗', 'success');
  });
}

document.addEventListener('keydown', e => { if (e.key==='Escape') mlvCloseModal(); });
mlvLoad();
</script>
{% endblock %}
